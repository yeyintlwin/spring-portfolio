name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (skip tests)
        run: ./gradlew bootJar --no-daemon -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:latest

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into server and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            echo "=== Setup directory ==="
            mkdir -p ~/spring-portfolio

            echo "=== Write latest docker-compose.yml ==="
            cat > ~/spring-portfolio/docker-compose.yml << 'EOF'
            services:
              portfolio:
                image: yeyintlwin/portfolio:latest
                ports:
                  - "8080:5000"
                environment:
                  SPRING_APPLICATION_NAME: portfolio
                restart: always
            EOF

            echo "=== Docker Hub login ==="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "=== Pull latest image ==="
            cd ~/spring-portfolio
            docker compose pull

            echo "=== Restart container ==="
            docker compose up -d --remove-orphans

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Running containers ==="
            docker ps
