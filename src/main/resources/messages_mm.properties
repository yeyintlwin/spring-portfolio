# Projects Section (မြန်မာဘာသာ)
projects.title=အထူးပြု ပရောဂျက်များ
projects.mantra=ကျွန်ုပ်၏ motto? "Less is more" ကျွန်ုပ်ဖန်တီးသည့် အရာတိုင်းသည် သန့်ရှင်းပြီး ရိုးရှင်းမှုနှင့် အဓိပ္ပါယ်ပါဝင်သည်။ တောက်ပပြီး ရိုးရှင်းမှုနှင့် အဓိပ္ပါယ်ရှိစေလိုသည်။

# Project 1: Music Store (မြန်မာဘာသာ)
projects.musicstore.description=ဤသည်မှာ ကျွန်ုပ်၏ ပထမဆုံး Android အက်ပ်ဖြစ်ပြီး ၂၀၁၅ ခုနှစ်လောက်တွင် ဖန်တီးခဲ့ပါသည်။ အသုံးပြုသူများသည် Title, Artist, Genre, Album အလိုက် MP3 ဖိုင်များ ရှာဖွေနိုင်ပြီး၊ ဒေါင်းလုပ်လုပ်နိုင်သည်။ Java ဖြင့် ဖန်တီးထားပြီး back-end ကို PHP ဖြင့် ရေးသားထားပါသည်။
# Project 2: CLISimpleManage (မြန်မာဘာသာ)
projects.cli.description=ဤသည်မှာ ကျွန်ုပ်၏ ပထမနှစ်ကျောင်းပရောဂျက်ဖြစ်သည်။ User, Shop, Bank ဆိုသည့် သုံးခုသော module များပါဝင်ပြီး Command Line Interface (CLI) မှတစ်ဆင့် စီမံခန့်ခွဲနိုင်သည်။ Java နှင့် MVC pattern ကို အသုံးပြု၍ ဖန်တီးထားပြီး JSON ဖြင့် ကိုယ်ပိုင် database တည်ဆောက်ထားသဖြင့် CRUD လုပ်ဆောင်နိုင်ပါသည်။

