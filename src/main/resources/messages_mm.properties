# Project 1: Music Store (မြန်မာဘာသာ)
projects.musicstore.description=ဒီ App က ကျွန်တော်ရေးခဲ့တဲ့ ပထမဆုံး Android App ဖြစ်ပြီး ၂၀၁၅ ခုနှစ်လောက်မှာ တည်ဆောက်ခဲ့တာပါ။ User တွေက Title, Artist, Genre, Album အလိုက် MP3 ဖိုင်တွေကို ရှာဖွေ၊ Download လုပ်ပြီး နားထောင်နိုင်ပါတယ်။ App ကို Java နဲ့ရေးထားပြီး Back-end ကို PHP နဲ့ တည်ဆောက်ထားပါတယ်။
# Project 2: CLISimpleManage (မြန်မာဘာသာ)
projects.cli.description=ဒီ Project က ကျွန်တော့်ပထမနှစ်ကျောင်း Project ဖြစ်ပါတယ်။ User, Shop, Bank ဆိုတဲ့ Module ၃ ခုပါဝင်ပြီး Command Line Interface (CLI) ကနေ စီမံနိုင်ပါတယ်။ Java နဲ့ MVC Pattern အသုံးပြုတည်ဆောက်ထားပြီး JSON အခြေပြု Custom Database ပါဝင်တာကြောင့် CRUD လုပ်ဆောင်ချက်အပြည့်အစုံကို ပံ့ပိုးနိုင်ပါတယ်။

projects.github.text=ကျွန်တော့်ရဲ့ အခြားပရောဂျက်တွေကို <a class="main-color" href="{0}">GitHub</a> မှာ ဝင်ကြည့်နိုင်ပါတယ်။

