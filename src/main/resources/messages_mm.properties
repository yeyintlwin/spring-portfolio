contact.description=ကျွန်ုပ်သည် စွမ်းအင်နှင့် အပြုသဘောဆောင်သူတစ်ဦးဖြစ်သည်။ မိတ်ဆွေပြုရလွယ်ကူပြီး စည်းကမ်းရှိသူဖြစ်သည်။ အလုပ်ကို တာဝန်ယူစွာ လုပ်ဆောင်သော်လည်း ပျော်ရွှင်မှုမပျောက်သွားပါ။ တကယ်တမ်း အလုပ်တွင် အားထုတ်သူတစ်ဦးလိုချင်ပါက ကျွန်ုပ်ကို ဆက်သွယ်ပါ။
