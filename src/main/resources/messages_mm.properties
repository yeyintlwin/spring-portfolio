header.description=ကျွန်တော်က Osaka ရှိ IT ကုမ္ပဏီတစ်ခုမှာ Software Developer အဖြစ် အလုပ်လုပ်နေပါတယ်။ Web Development, Mobile App Development, Back-end Programming, Embedded Programming နဲ့ Digital Electronics ကို အထူးစိတ်ဝင်စားပါတယ်။ Physics အခြေခံတည်ငြိမ်ပြီး လက်တွေ့အတွေ့အကြုံလည်း ရှိတဲ့အတွက် အသုံးပြုရလွယ်ကူတဲ့ App တွေ ဖန်တီးပြီး ပြဿနာတွေကို ထိရောက်စွာ ဖြေရှင်းရတာကို ဝါသနာပါပါတယ်။

# About Section (မြန်မာဘာသာ)
about.title=ကျွန်တော်အကြောင်း
about.subtitle=ကျွန်တော် ဘယ်သူလဲ?
about.intro=👋 ကျွန်တော့်နာမည် <b>ရဲရင့်လွင်</b> ဖြစ်ပါတယ်။ မြန်မာနိုင်ငံသားတစ်ယောက်ဖြစ်ပြီး အခုတော့ ဂျပန်နိုင်ငံ Osaka မှာနေထိုင်ကာ မြို့တွင်း IT ကုမ္ပဏီတစ်ခုမှာ Software Developer အဖြစ် အလုပ်လုပ်နေပါတယ်။ ကလေးဘဝကတည်းက စက်ပစ္စည်းနဲ့ အီလက်ထရွန်းနစ်ပစ္စည်းတွေကို ပြုပြင်တည်ဆောက်ရတာကို စိတ်ဝင်စားခဲ့ပါတယ်။ အဲဒီဝါသနာကနေ App Development နဲ့ IT လမ်းကြောင်းကို ဆက်လက်လျှောက်လှမ်းလာခဲ့ပါတယ်။ Electronic Circuit Design, Embedded Programming, Front-end နဲ့ Back-end Development တွေကို အထူးပြုလုပ်ကိုင်နေပြီး Logic နဲ့ Creativity ကို ပေါင်းစပ်ကာ လက်တွေ့အသုံးဝင်တဲ့ Solution တွေကို ဖန်တီးပေးနိုင်ပါတယ်။

