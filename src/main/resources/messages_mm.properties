# Header Section (မြန်မာဘာသာ)
header.greeting=မင်္ဂလာပါ! ကျွန်ုပ်မှာ
header.title=ဆော့ဖ်ဝဲလ် တီထွင်သူတစ်ဦး
header.description=ကျွန်ုပ်သည် Osaka ရှိ IT ကုမ္ပဏီတစ်ခုတွင် ဆော့ဖ်ဝဲလ်တီထွင်သူအဖြစ် အလုပ်လုပ်ကိုင်နေပြီး ဝက်ဘ်ဖွံ့ဖြိုးရေး၊ မိုဘိုင်းအက်ပ်ဖွံ့ဖြိုးရေး၊ back-end programming၊ embedded programming နှင့် digital electronics များအပေါ် စိတ်ဝင်စားမှုရှိပါသည်။ ရူပဗေဒအခြေခံတည်ရှိပြီး လက်တွေ့အတွေ့အကြုံများစွာရှိသောကြောင့် အသုံးပြုရလွယ်ကူသော အက်ပ်များဖန်တီးခြင်းနှင့် ပြဿနာများကို ဖြေရှင်းခြင်းကို ဝါသနာပါသည်။

# About Section (မြန်မာဘာသာ)
about.title=ကျွန်ုပ်အကြောင်း
about.subtitle=ကျွန်ုပ်ဘယ်သူလဲ?
about.intro=👋 ကျွန်ုပ်အမည်မှာ <b>ရဲရင့်လွင်</b> ဖြစ်ပြီး မြန်မာနိုင်ငံသားတစ်ဦးဖြစ်ပါသည်။ လက်ရှိတွင် ဂျပန်နိုင်ငံ Osaka တွင် အခြေချနေပြီး မြို့တွင်းရှိ IT ကုမ္ပဏီတစ်ခုတွင် ဆော့ဖ်ဝဲလ်တီထွင်သူအဖြစ် အလုပ်လုပ်ကိုင်နေပါသည်။ ကလေးဘဝကတည်းက စက်ပစ္စည်းများနှင့် အီလက်ထရောနစ်များ ပြုပြင်ဖန်တီးခြင်းကို ဝါသနာပါသည်။ ဘွဲ့ရပြီးနောက် ဒီဝါသနာကြောင့် app ဖန်တီးခြင်းနှင့် IT လမ်းကြောင်းကို ဆက်လက်လျှောက်လှမ်းခဲ့ပါသည်။ အီလက်ထရောနစ်စက်ဝိုင်းဖန်တီးခြင်း၊ embedded programming၊ front-end နှင့် back-end ဖန်တီးခြင်းတို့တွင် အထူးပြုပါသည်။ လိုဂစ်စဉ်းစားနိုင်စွမ်းနှင့် ဖန်တီးနိုင်စွမ်းကို ပေါင်းစပ်ပြီး ဆန်းသစ်သော ဖြေရှင်းချက်များပေးနိုင်ပါသည်။

