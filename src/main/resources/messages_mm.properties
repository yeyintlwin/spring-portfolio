contact.description=ကျွန်တော်က လက်ရှိ Osaka ရှိ IT ကုမ္ပဏီတစ်ခုမှာ Software Developer အဖြစ် အလုပ်လုပ်နေပါတယ်။ အသုံးပြုသူအတွက် လက်တွေ့အသုံးဝင်တဲ့ solution တွေကို တည်ဆောက်ရတာနဲ့ quality, ownership, continuous improvement ကို တန်ဖိုးထားတဲ့ team တွေနဲ့ လက်တွဲလုပ်ရတာကို နှစ်သက်ပါတယ်။ ကျွန်တော့် profile က သင့် project သို့မဟုတ် team နဲ့ ကိုက်ညီမယ်ဆိုရင် ဆက်သွယ်နိုင်ပါတယ်။
