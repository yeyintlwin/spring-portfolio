about.intro=👋 <b>イェインルイン</b>と申します。ミャンマー出身で、現在は大阪を拠点にIT企業でソフトウェア開発者として働いています。子どもの頃から機械や電子機器の修理・製作が好きで、その興味をきっかけにアプリ開発とITの道に進みました。電子回路設計、組み込み開発、フロントエンド／バックエンド開発を得意とし、論理的思考と創造性を組み合わせて実用的なソリューションを形にしています。

