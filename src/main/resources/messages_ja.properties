projects.title=注目プロジェクト
projects.mantra=私のモットーは「Less is more」。私がデザインするものはすべてシンプルで目的が明確です。大胆に、ミニマルに、意味のあるものを作りましょう！

# プロジェクト1：Music Store
projects.musicstore.description=これは2015年頃に作成した私の初めてのAndroidアプリです。タイトル、アーティスト、ジャンル、アルバムなどのカテゴリでMP3ファイルを検索し、ダウンロードして再生できます。Javaで開発し、バックエンドはPHPで作成しました。
# プロジェクト2：CLISimpleManage
projects.cli.description=これは私の1年目の学校プロジェクトです。ユーザー、ショップ、バンクの3つのモジュールで構成され、コマンドラインインターフェース（CLI）で管理します。JavaとMVCパターンで構築し、JSONで作成したカスタムデータベースで完全なCRUD操作をサポートしています。

