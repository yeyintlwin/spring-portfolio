about.intro=👋 私の名前は<b>イェインルイン</b>です。ミャンマー出身で、現在大阪でITを学んでいます。子供の頃から機械や電子機器の修理・作成に情熱を持っていました。この情熱がアプリ開発やIT分野への道を切り開きました。電子回路の構築、組み込みプログラミング、フロントエンド・バックエンド開発を得意とし、論理的思考と創造力を組み合わせて革新的なソリューションを提供します。

