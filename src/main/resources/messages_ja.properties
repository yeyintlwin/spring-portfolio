projects.musicstore.description=2015年ごろに制作した、初めてのAndroidアプリです。タイトル・アーティスト・ジャンル・アルバムなどでMP3を検索し、ダウンロードして再生できます。Javaで開発し、バックエンドはPHPで実装しました。
# プロジェクト2：CLISimpleManage
projects.cli.description=1年目の学校プロジェクトとして制作したアプリです。User・Shop・Bankの3モジュールで構成され、CLI（Command Line Interface）で操作します。Java + MVCパターンで構築し、JSONベースのカスタムデータベースでCRUD操作を実現しました。

