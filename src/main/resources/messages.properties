# About Section
about.title=About Me
about.subtitle=Who am I?
about.intro=👋 My name is <b>Ye Yint Lwin</b>, a Myanmar national based in Osaka, Japan. I work as a software developer at an IT company here. Since childhood, I've been passionate about repairing and creating machines and electronics. That passion led me to app development and IT after earning my bachelor's degree. I specialize in building electronic circuits, embedded programming, front-end, and back-end development, combining logical thinking with creativity to deliver innovative solutions.

