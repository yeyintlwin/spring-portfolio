# Projects Section
projects.title=Featured Projects
projects.mantra=My mantra? "Less is more." Everything I design is clean, simple, and packed with purpose. Let's keep it bold, minimal, and meaningful!

# Project 1: Music Strore
projects.musicstore.description=This is my first Android app, which I created around 2015. The app allows users to search for MP3 files by categories such as Title, Artist, Genre, and Album, download MP3 files, and listen to them. It was developed using Java, and the back-end was written in PHP.
# Project 2: CLISimpleManage
projects.cli.description=This is my first-year school project. The program consists of three modules: User, Shop, and Bank, which are managed through a Command Line Interface (CLI). Built with Java using the MVC pattern, it features a custom database created with JSON to support full CRUD operations.


