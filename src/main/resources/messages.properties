# About Section
about.title=About Me
about.subtitle=Who am I?
about.intro=👋 My name is <b>Ye Yint Lwin</b>, a Myanmar national currently studying IT in Osaka, Japan. Since childhood, I've been passionate about repairing and creating machines and electronics. This passion led me to explore app development and dive into IT after earning my bachelor's degree. I specialize in building electronic circuits, embedded programming, front-end, and back-end development, combining logical thinking with creativity to deliver innovative solutions.

