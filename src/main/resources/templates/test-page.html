<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Test Page</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            font-family: monospace;
            color: #e2e8f0;
        }
        .card {
            text-align: center;
            padding: 3rem 4rem;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #1e293b;
        }
        .badge {
            display: inline-block;
            background: #22c55e;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 999px;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin: 0 0 0.75rem;
        }
        p {
            color: #94a3b8;
            margin: 0 0 2rem;
        }
        .time {
            font-size: 0.85rem;
            color: #475569;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            color: #60a5fa;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✓ DEPLOYED</div>
        <h1>CI/CD Pipeline Works!</h1>
        <p>GitHub Actions → Docker Hub → Lightsail</p>
        <div class="time">Deployed at: <span id="ts"></span></div>
        <a href="/">← Back to Home</a>
    </div>
    <script>
        document.getElementById('ts').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
